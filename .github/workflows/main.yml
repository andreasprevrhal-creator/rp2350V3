name: Build-Waveshare-RP2350B-Hybrid
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MicroPython
        uses: actions/checkout@v4
        with:
          repository: micropython/micropython
          submodules: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi build-essential python3 libnewlib-arm-none-eabi

      - name: Build mpy-cross
        run: make -C mpy-cross

      - name: Patch Board Definition
        run: |
          # Pfad zur Konfiguration des Pico 2 W
          CONF="ports/rp2/boards/RPI_PICO2_W/mpconfigboard.h"
          
          # Bestehende PSRAM-Einträge entfernen, um Dopplungen zu vermeiden
          sed -i '/MICROPY_HW_PSRAM/d' $CONF
          
          # PSRAM auf GPIO 47 für Waveshare aktivieren
          echo "#define MICROPY_HW_PSRAM_CS_PIN (47)" >> $CONF
          echo "#define MICROPY_HW_PSRAM_MAX_SEG_SIZE (8 * 1024 * 1024)" >> $CONF
          
          # QMI (Speicher-Controller) aktivieren
          echo "#define MICROPY_HW_QMI_SUPPORT (1)" >> $CONF

      - name: Build Firmware
        run: |
          # Wir bauen für das Board RPI_PICO2_W, aber erzwingen den RP2350 Chip
          make -C ports/rp2 BOARD=RPI_PICO2_W BOARD_VARIANT=rp2350

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: waveshare-hybrid-firmware
          path: ports/rp2/build-RPI_PICO2_W/firmware.uf2
